<script>
const ornekler = [
  {cinsiyet:"erkek", boy:190, kilo:80, gobekli:"hayir", pantolon:"53-9", elbise:"54-8"},
  {cinsiyet:"erkek", boy:177, kilo:84, gobekli:"hayir", pantolon:"53-7", elbise:"53-5 / 53-7", gomlek:"L-B", mont:"54-C"},
  {cinsiyet:"erkek", boy:182, kilo:88, gobekli:"hayir", pantolon:"54-6", elbise:"54-6", gomlek:"L-B"},
  {cinsiyet:"erkek", boy:175, kilo:75, gobekli:"hayir", gomlek:"M-B"},
  {cinsiyet:"erkek", boy:168, kilo:67, gobekli:"hayir", gomlek:"M-A"},
  {cinsiyet:"erkek", boy:190, kilo:82, gobekli:"hayir", gomlek:"L-C"},
  {cinsiyet:"erkek", boy:190, kilo:90, gobekli:"hayir", gomlek:"XL-C"},
  {cinsiyet:"erkek", boy:190, kilo:95, gobekli:"hayir", gomlek:"XXL-C"},

  {cinsiyet:"erkek", boy:172, kilo:93, gobekli:"evet", mont:"54-B", yelek:"54-B", pardosu:"54-B", gomlek:"M-B", pantolon:"54-6 / 55-7", elbise:"54-6A"},
  {cinsiyet:"erkek", boy:180, kilo:93, gobekli:"hayir", mont:"56-D", yelek:"56-D", pardosu:"56-D"},

  {cinsiyet:"kadin", boy:172, kilo:58, gobekli:"hayir", mont:"42-B", pardosu:"42-B", pantolon:"42-2"}
];

function upEven(n){
  return n % 2 === 0 ? n + 2 : n + 1;
}

function upOdd(n){
  return n % 2 === 1 ? n + 2 : n + 1;
}

function shirtUp(size){
  const sizes = ["S","M","L","XL","XXL","3XL"];
  const i = sizes.indexOf(size);
  if (i === -1 || i === sizes.length - 1) return size;
  return sizes[i + 1];
}

function erkekUstHarf(boy){
  if (boy >= 185) return "E";
  if (boy >= 180) return "D";
  if (boy >= 175) return "C";
  return "B";
}

function kadinUstHarf(boy){
  if (boy >= 175) return "C";
  if (boy >= 165) return "B";
  return "A";
}

function erkekUstGiyim(boy, kilo, gobekli, alan="mont"){
  const eslesme = ornekler.find(o =>
    o.cinsiyet === "erkek" &&
    o.boy === boy &&
    o.kilo === kilo &&
    o.gobekli === gobekli &&
    o[alan]
  );
  if (eslesme) return eslesme[alan];

  let beden;
  if (kilo < 65) beden = 48;
  else if (kilo < 72) beden = 50;
  else if (kilo < 80) beden = 52;
  else if (kilo < 87) beden = 54;
  else if (kilo < 96) beden = 56;
  else if (kilo < 103) beden = 58;
  else beden = 60;

  // boy etkisi daha yumuşak
  if (boy >= 188 && kilo <= 85) beden += 2;
  else if (boy >= 180 && kilo <= 85) beden += 0;

  // göbek/basen var ise üst giyimde artık kör +1 kademe yok.
  // sadece sınırdaki durumlarda bir üst çift beden
  if (gobekli === "evet" && kilo < 88) beden = upEven(beden);

  beden = Math.max(46, Math.min(62, beden));
  if (beden % 2 !== 0) beden += 1;

  return `${beden}-${erkekUstHarf(boy)}`;
}

function kadinMont(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="kadin" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.mont
  );
  if (eslesme) return eslesme.mont;

  let beden;
  if (kilo < 50) beden = 38;
  else if (kilo < 56) beden = 40;
  else if (kilo < 63) beden = 42;
  else if (kilo < 70) beden = 44;
  else if (kilo < 78) beden = 46;
  else if (kilo < 86) beden = 48;
  else beden = 50;

  if (gobekli === "evet") beden += 2;
  beden = Math.min(54, beden);
  return `${beden}-${kadinUstHarf(boy)}`;
}

function kadinYelek(boy, kilo, gobekli){
  let beden;
  if (kilo < 50) beden = 38;
  else if (kilo < 56) beden = 40;
  else if (kilo < 63) beden = 42;
  else if (kilo < 70) beden = 44;
  else if (kilo < 78) beden = 46;
  else if (kilo < 86) beden = 48;
  else beden = 50;

  if (gobekli === "evet") beden += 2;
  beden = Math.min(52, beden);
  return `${beden}-${kadinUstHarf(boy)}`;
}

function kadinPardosu(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="kadin" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.pardosu
  );
  if (eslesme) return eslesme.pardosu;
  return kadinMont(boy, kilo, gobekli);
}

function erkekPantolon(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="erkek" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.pantolon
  );
  if (eslesme) return eslesme.pantolon;

  let ana;
  if (kilo < 65) ana = 47;
  else if (kilo < 72) ana = 49;
  else if (kilo < 79) ana = 51;
  else if (kilo < 86) ana = 53;
  else if (kilo < 94) ana = 54;
  else if (kilo < 100) ana = 56;
  else ana = 58;

  let alt;
  if (ana % 2 === 0){
    if (boy < 168) alt = 4;
    else if (boy < 177) alt = 6;
    else if (boy < 186) alt = 8;
    else alt = 10;
  } else {
    if (boy < 168) alt = 5;
    else if (boy < 180) alt = 7;
    else alt = 9;
  }

  // göbek/basen var ise alt giyimde tek sefer yükseltme
  if (gobekli === "evet"){
    if (ana % 2 === 0) return `${upOdd(ana)}-${alt}A`;
    return `${ana}-${alt}A`;
  }

  return `${ana}-${alt}`;
}

function kadinPantolon(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="kadin" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.pantolon
  );
  if (eslesme) return eslesme.pantolon;

  let ana;
  if (kilo < 50) ana = 38;
  else if (kilo < 55) ana = 40;
  else if (kilo < 61) ana = 42;
  else if (kilo < 67) ana = 44;
  else if (kilo < 73) ana = 46;
  else if (kilo < 79) ana = 48;
  else if (kilo < 85) ana = 50;
  else if (kilo < 91) ana = 52;
  else ana = 54;

  if (gobekli === "evet") ana += 2;
  ana = Math.min(54, ana);

  let alt;
  if (boy <= 160) alt = 1;
  else if (boy <= 173) alt = 2;
  else if (boy <= 178) alt = 3;
  else if (boy <= 183) alt = 4;
  else alt = 5;

  return `${ana}-${alt}`;
}

function erkekElbise(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="erkek" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.elbise
  );
  if (eslesme) return eslesme.elbise;

  let ana;
  if (kilo < 68) ana = 48;
  else if (kilo < 77) ana = 50;
  else if (kilo < 86) ana = 52;
  else if (kilo < 94) ana = 54;
  else if (kilo < 100) ana = 56;
  else ana = 58;

  let alt;
  if (boy < 168) alt = 4;
  else if (boy < 178) alt = 6;
  else if (boy < 188) alt = 8;
  else alt = 10;

  if (gobekli === "evet"){
    if (ana % 2 === 0) return `${upOdd(ana)}-${alt}A`;
    return `${ana}-${alt}A`;
  }

  return `${ana}-${alt}`;
}

function kadinElbise(boy, kilo, gobekli){
  let ana;
  if (kilo < 50) ana = 38;
  else if (kilo < 55) ana = 40;
  else if (kilo < 61) ana = 42;
  else if (kilo < 67) ana = 44;
  else if (kilo < 73) ana = 46;
  else if (kilo < 79) ana = 48;
  else if (kilo < 85) ana = 50;
  else if (kilo < 91) ana = 52;
  else ana = 54;

  if (gobekli === "evet") ana += 2;
  ana = Math.min(54, ana);

  let alt;
  if (boy <= 160) alt = 1;
  else if (boy <= 173) alt = 2;
  else if (boy <= 178) alt = 3;
  else if (boy <= 183) alt = 4;
  else alt = 5;

  const aEki = gobekli === "evet" ? "A" : "";
  return `${ana}-${alt}${aEki}`;
}

function erkekGomlek(boy, kilo, gobekli){
  const eslesme = ornekler.find(o =>
    o.cinsiyet==="erkek" && o.boy===boy && o.kilo===kilo && o.gobekli===gobekli && o.gomlek
  );
  if (eslesme) return eslesme.gomlek;

  let beden;
  if (kilo < 72) beden = "M";
  else if (kilo < 82) beden = "M";
  else if (kilo < 90) beden = "L";
  else if (kilo < 95) beden = "XL";
  else beden = "XXL";

  if (boy >= 188){
    if (kilo < 90) beden = "L";
    else if (kilo < 95) beden = "XL";
    else beden = "XXL";
  } else if (boy >= 175 && kilo >= 80){
    beden = "L";
  }

  // göbek/basen seçeneği gömleği sadece gerekli aralıkta büyütsün
  if (gobekli === "evet" && kilo < 88){
    beden = shirtUp(beden);
  }

  let tip;
  if (boy >= 180) tip = "C";
  else if (boy >= 170) tip = "B";
  else tip = "A";

  return `${beden}-${tip}`;
}

function kadinGomlek(boy, kilo, gobekli){
  let beden;
  if (kilo < 50) beden = "S";
  else if (kilo < 60) beden = "M";
  else if (kilo < 70) beden = "L";
  else if (kilo < 80) beden = "XL";
  else beden = "XXL";

  if (gobekli === "evet") beden = shirtUp(beden);

  let tip;
  if (boy >= 175) tip = "C";
  else if (boy >= 165) tip = "B";
  else tip = "A";

  return `${beden}-${tip}`;
}

function hesapla(){
  const cinsiyet = document.getElementById("cinsiyet").value;
  const gobekli = document.getElementById("gobekli").value;
  const boy = Number(document.getElementById("boy").value);
  const kilo = Number(document.getElementById("kilo").value);

  if (!boy || !kilo){
    document.getElementById("uyari").textContent = "Boy ve kilo girildiğinde öneri üretilebilir.";
    return;
  }

  let mont="", yelek="", pardosu="", pantolon="", elbise="", gomlek="";

  if (cinsiyet === "erkek"){
    mont = erkekUstGiyim(boy, kilo, gobekli, "mont");
    yelek = erkekUstGiyim(boy, kilo, gobekli, "yelek");
    pardosu = erkekUstGiyim(boy, kilo, gobekli, "pardosu");
    pantolon = erkekPantolon(boy, kilo, gobekli);
    elbise = erkekElbise(boy, kilo, gobekli);
    gomlek = erkekGomlek(boy, kilo, gobekli);
  } else {
    mont = kadinMont(boy, kilo, gobekli);
    yelek = kadinYelek(boy, kilo, gobekli);
    pardosu = kadinPardosu(boy, kilo, gobekli);
    pantolon = kadinPantolon(boy, kilo, gobekli);
    elbise = kadinElbise(boy, kilo, gobekli);
    gomlek = kadinGomlek(boy, kilo, gobekli);
  }

  const kisiYazisi = `${cinsiyet === "erkek" ? "Erkek" : "Kadın"} • ${boy} cm • ${kilo} kg • ${gobekli === "evet" ? "Göbek/Basen var" : "Göbek/Basen yok"}`;

  document.getElementById("kisiBilgisi").textContent = kisiYazisi;
  document.getElementById("mont").textContent = mont;
  document.getElementById("yelek").textContent = yelek;
  document.getElementById("pardosu").textContent = pardosu;
  document.getElementById("pantolon").textContent = pantolon;
  document.getElementById("elbise").textContent = elbise;
  document.getElementById("gomlek").textContent = gomlek;

  document.getElementById("cards").classList.add("show");
  document.getElementById("placeholder").style.display = "none";
  document.getElementById("uyari").textContent = "Bu ekran ön öneri verir. Göbek veya basen varsa sistem bir üst beden önerir.";
}

function temizle(){
  document.getElementById("cinsiyet").value = "erkek";
  document.getElementById("gobekli").value = "hayir";
  document.getElementById("boy").value = "";
  document.getElementById("kilo").value = "";
  document.getElementById("kisiBilgisi").textContent = "Önce bilgileri girip bedenleri göster butonuna basın.";
  ["mont","yelek","pardosu","pantolon","elbise","gomlek"].forEach(id => {
    document.getElementById(id).textContent = "-";
  });
  document.getElementById("cards").classList.remove("show");
  document.getElementById("placeholder").style.display = "block";
  document.getElementById("uyari").textContent = "Bu ekran ön öneri verir. Kesin beden depo kontrolü ile netleşir.";
}
</script>

</body>
</html>
