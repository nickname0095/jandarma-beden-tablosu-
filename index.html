<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jandarma Genel Komutanlığı - Beden Sistemi</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f3a;
  color:white;
}

.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

h1{
  text-align:center;
  color:#d4af37;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1f6b45;
  color:white;
  font-weight:bold;
}

.result{
  margin-top:20px;
  background:#122b4d;
  padding:15px;
  border-radius:10px;
}

.result div{
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">
<h1>Beden Sistemi</h1>

<div class="grid">
<input id="boy" placeholder="Boy (cm)">
<input id="kilo" placeholder="Kilo (kg)">
</div>

<div class="grid">
<select id="cinsiyet">
<option value="erkek">Erkek</option>
<option value="kadin">Kadın</option>
</select>

<select id="gobek">
<option value="yok">Göbek yok</option>
<option value="var">Göbek var</option>
</select>
</div>

<button onclick="hesapla()">Beden Hesapla</button>

<div class="result" id="sonuc"></div>
</div>

<script>
function hesapla(){

let boy = parseInt(document.getElementById("boy").value);
let kilo = parseInt(document.getElementById("kilo").value);
let gobek = document.getElementById("gobek").value;

let mont = "54-C";
let pantolon = "53-7";
let elbise = "54-6";
let gomlek = "L-B";

// SENİN REFERANSLAR
if(boy==177 && kilo==84){
  pantolon = "53-7";
  elbise = "53-5 / 53-7";
  gomlek = "L-B";
}

// GENEL KURALLAR (basit başlangıç)
if(boy>185){
  mont = "56-E";
}
if(kilo>90){
  mont = "58-D";
}
if(gobek=="var"){
  pantolon = pantolon + "A";
}

document.getElementById("sonuc").innerHTML = `
<div><b>Mont:</b> ${mont}</div>
<div><b>Pantolon:</b> ${pantolon}</div>
<div><b>Elbise:</b> ${elbise}</div>
<div><b>Gömlek:</b> ${gomlek}</div>
`;

}
</script>

</body>
</html>
